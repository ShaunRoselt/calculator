<svg width="1440" height="640" viewBox="0 0 1440 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rainA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6fff8" stop-opacity="0.98"/>
      <stop offset="0.08" stop-color="#a7ffae" stop-opacity="0.95"/>
      <stop offset="0.28" stop-color="#66ff72" stop-opacity="0.88"/>
      <stop offset="0.62" stop-color="#35d84e" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#0a2a11" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowA" x="-40%" y="-12%" width="180%" height="124%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.6" flood-color="#7fff88" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#61ff76" flood-opacity="0.42"/>
    </filter>
    <style>
      .col {
        fill: url(#rainA);
        font-family: "Noto Sans Mono CJK JP", "Noto Sans JP", "MS Gothic", monospace;
        font-weight: 700;
        writing-mode: vertical-rl;
