  <g filter="url(#glowB)">
    <text class="col" x="40" y="-280" font-size="18" opacity="0.6">ﾈ+ﾂﾖ|ﾌﾏﾜ*ﾘﾅﾁ=ﾚﾎﾕ/ﾔﾐﾓﾈ+ﾂﾖ|ﾌﾏﾜ*ﾘﾅﾁ=ﾚﾎﾕ/ﾔﾐﾓﾈ+ﾂﾖ|ﾌﾏﾜ*ﾘﾅﾁ=ﾚﾎﾕ/ﾔﾐﾓ</text>
    <text class="col" x="98" y="-154" font-size="16" opacity="0.52">ﾖﾁﾚ-ﾎﾜﾅ|ﾂﾏﾕ+ﾘﾌﾓ=ﾔﾈﾖﾁﾚ-ﾎﾜﾅ|ﾂﾏﾕ+ﾘﾌﾓ=ﾔﾈﾖﾁﾚ-ﾎﾜﾅ|ﾂﾏﾕ+ﾘﾌﾓ=ﾔﾈ</text>
    <text class="col" x="152" y="-344" font-size="20" opacity="0.68">ﾏﾘﾂ*ﾜﾅﾖ|ﾌﾚﾁ+ﾎﾕﾓ=ﾔﾈｱﾏﾘﾂ*ﾜﾅﾖ|ﾌﾚﾁ+ﾎﾕﾓ=ﾔﾈｱﾏﾘﾂ*ﾜﾅﾖ|ﾌﾚﾁ+ﾎﾕﾓ=ﾔﾈｱ</text>
    <text class="col" x="214" y="-112" font-size="14" opacity="0.46">ﾁﾎﾚ|ﾅﾏﾜ+ﾂﾖﾌ*ﾘﾕﾓ=ﾔﾁﾎﾚ|ﾅﾏﾜ+ﾂﾖﾌ*ﾘﾕﾓ=ﾔﾁﾎﾚ|ﾅﾏﾜ+ﾂﾖﾌ*ﾘﾕﾓ=ﾔ</text>
    <text class="col" x="264" y="-246" font-size="16" opacity="0.58">ﾜﾂﾈ=ﾌﾘﾖ|ﾏﾁﾎ+ﾕﾅﾚ*ﾓﾜﾂﾈ=ﾌﾘﾖ|ﾏﾁﾎ+ﾕﾅﾚ*ﾓﾜﾂﾈ=ﾌﾘﾖ|ﾏﾁﾎ+ﾕﾅﾚ*ﾓ</text>
    <text class="col" x="318" y="-320" font-size="22" opacity="0.72">ﾚﾎﾏ+ﾁﾕﾜ|ﾅﾂﾖ*ﾘﾓﾌ=ﾔﾈﾚﾎﾏ+ﾁﾕﾜ|ﾅﾂﾖ*ﾘﾓﾌ=ﾔﾈﾚﾎﾏ+ﾁﾕﾜ|ﾅﾂﾖ*ﾘﾓﾌ=ﾔﾈ</text>
    <text class="col" x="388" y="-168" font-size="16" opacity="0.55">ﾌﾅﾖ|ﾘﾏﾂ+ﾜﾁﾚ*ﾎﾕﾓ=ﾔﾌﾅﾖ|ﾘﾏﾂ+ﾜﾁﾚ*ﾎﾕﾓ=ﾔﾌﾅﾖ|ﾘﾏﾂ+ﾜﾁﾚ*ﾎﾕﾓ=ﾔ</text>
    <text class="col" x="454" y="-278" font-size="18" opacity="0.64">ﾖﾜﾁ*ﾈﾌﾚ|ﾏﾘﾂ+ﾎﾕﾅ=ﾓﾖﾜﾁ*ﾈﾌﾚ|ﾏﾘﾂ+ﾎﾕﾅ=ﾓﾖﾜﾁ*ﾈﾌﾚ|ﾏﾘﾂ+ﾎﾕﾅ=ﾓ</text>
    <text class="col" x="512" y="-136" font-size="15" opacity="0.5">ﾘﾅﾎ+ﾜﾂﾖ|ﾌﾏﾚ*ﾕﾁﾓ=ﾘﾅﾎ+ﾜﾂﾖ|ﾌﾏﾚ*ﾕﾁﾓ=ﾘﾅﾎ+ﾜﾂﾖ|ﾌﾏﾚ*ﾕﾁﾓ=</text>
    <text class="col" x="566" y="-356" font-size="20" opacity="0.7">ﾂﾖﾌ|ﾚﾏﾅ+ﾎﾜﾁ*ﾘﾕﾓ=ﾈﾂﾖﾌ|ﾚﾏﾅ+ﾎﾜﾁ*ﾘﾕﾓ=ﾈﾂﾖﾌ|ﾚﾏﾅ+ﾎﾜﾁ*ﾘﾕﾓ=ﾈ</text>
    <text class="col" x="638" y="-214" font-size="18" opacity="0.6">ﾏﾁﾚ=ﾕﾎﾜ|ﾅﾂﾖ+ﾌﾘﾓ*ﾏﾁﾚ=ﾕﾎﾜ|ﾅﾂﾖ+ﾌﾘﾓ*ﾏﾁﾚ=ﾕﾎﾜ|ﾅﾂﾖ+ﾌﾘﾓ*</text>
    <text class="col" x="696" y="-304" font-size="16" opacity="0.55">ﾎﾜﾅ|ﾁﾚﾏ+ﾂﾖﾌ*ﾘﾕﾈ=ﾓﾎﾜﾅ|ﾁﾚﾏ+ﾂﾖﾌ*ﾘﾕﾈ=ﾓﾎﾜﾅ|ﾁﾚﾏ+ﾂﾖﾌ*ﾘﾕﾈ=ﾓ</text>
    <text class="col" x="760" y="-170" font-size="15" opacity="0.48">ﾜﾂﾕ+ﾈﾌﾘ|ﾏﾁﾎ*ﾚﾅﾓ=ﾜﾂﾕ+ﾈﾌﾘ|ﾏﾁﾎ*ﾚﾅﾓ=ﾜﾂﾕ+ﾈﾌﾘ|ﾏﾁﾎ*ﾚﾅﾓ=</text>
    <text class="col" x="826" y="-334" font-size="20" opacity="0.72">ﾚﾏﾅ*ﾖﾌﾜ|ﾁﾂﾘ+ﾎﾕﾓ=ﾈﾚﾏﾅ*ﾖﾌﾜ|ﾁﾂﾘ+ﾎﾕﾓ=ﾈﾚﾏﾅ*ﾖﾌﾜ|ﾁﾂﾘ+ﾎﾕﾓ=ﾈ</text>
    <text class="col" x="898" y="-124" font-size="16" opacity="0.52">ﾌﾘﾖ|ﾏﾅﾎ+ﾜﾂﾚ*ﾕﾁﾓ=ﾌﾘﾖ|ﾏﾅﾎ+ﾜﾂﾚ*ﾕﾁﾓ=ﾌﾘﾖ|ﾏﾅﾎ+ﾜﾂﾚ*ﾕﾁﾓ=</text>
    <text class="col" x="954" y="-286" font-size="18" opacity="0.62">ﾖﾈﾂ+ﾌﾜﾘ|ﾏﾁﾎ*ﾚﾕﾅ=ﾓﾖﾈﾂ+ﾌﾜﾘ|ﾏﾁﾎ*ﾚﾕﾅ=ﾓﾖﾈﾂ+ﾌﾜﾘ|ﾏﾁﾎ*ﾚﾕﾅ=ﾓ</text>
    <text class="col" x="1016" y="-150" font-size="14" opacity="0.44">ﾅﾎﾚ|ﾜﾂﾖ+ﾌﾏﾘ*ﾕﾁﾓ=ﾅﾎﾚ|ﾜﾂﾖ+ﾌﾏﾘ*ﾕﾁﾓ=ﾅﾎﾚ|ﾜﾂﾖ+ﾌﾏﾘ*ﾕﾁﾓ=</text>
    <text class="col" x="1084" y="-348" font-size="20" opacity="0.68">ﾂﾚﾖ*ﾎﾅﾜ|ﾁﾏﾌ+ﾘﾕﾓ=ﾈﾂﾚﾖ*ﾎﾅﾜ|ﾁﾏﾌ+ﾘﾕﾓ=ﾈﾂﾚﾖ*ﾎﾅﾜ|ﾁﾏﾌ+ﾘﾕﾓ=ﾈ</text>
    <text class="col" x="1150" y="-204" font-size="16" opacity="0.58">ﾏﾎﾜ+ﾁﾂﾚ|ﾅﾌﾘ*ﾕﾓﾈ=ﾏﾎﾜ+ﾁﾂﾚ|ﾅﾌﾘ*ﾕﾓﾈ=ﾏﾎﾜ+ﾁﾂﾚ|ﾅﾌﾘ*ﾕﾓﾈ=</text>
    <text class="col" x="1218" y="-266" font-size="18" opacity="0.62">ﾖﾌﾏ|ﾚﾁﾜ+ﾂﾅﾎ*ﾘﾕﾓ=ﾈﾖﾌﾏ|ﾚﾁﾜ+ﾂﾅﾎ*ﾘﾕﾓ=ﾈﾖﾌﾏ|ﾚﾁﾜ+ﾂﾅﾎ*ﾘﾕﾓ=ﾈ</text>
    <text class="col" x="1280" y="-186" font-size="15" opacity="0.48">ﾚﾜﾁ+ﾎﾅﾂ|ﾌﾏﾘ*ﾕﾓﾈ=ﾚﾜﾁ+ﾎﾅﾂ|ﾌﾏﾘ*ﾕﾓﾈ=ﾚﾜﾁ+ﾎﾅﾂ|ﾌﾏﾘ*ﾕﾓﾈ=</text>
    <text class="col" x="1346" y="-330" font-size="19" opacity="0.68">ﾁﾖﾌ*ﾜﾏﾚ|ﾅﾂﾎ+ﾘﾕﾓ=ﾈﾁﾖﾌ*ﾜﾏﾚ|ﾅﾂﾎ+ﾘﾕﾓ=ﾈﾁﾖﾌ*ﾜﾏﾚ|ﾅﾂﾎ+ﾘﾕﾓ=ﾈ</text>
