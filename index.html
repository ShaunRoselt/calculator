<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2025" />
    <title>Roselt Calculator</title>
    <link rel="icon" id="page-favicon" type="image/svg+xml" href="assets/logos/dark.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/Views/DateCalculator.css" />
    <link rel="stylesheet" href="styles/Views/Settings.css" />
    <link rel="stylesheet" id="active-theme-stylesheet" href="assets/themes/css/dark.css" />
    <style>
      :root {
        --header-height: 74px;
        --header-row-height: 74px;
        --header-max-width: 1440px;
        --header-border: color-mix(in srgb, var(--text) 12%, transparent);
        --header-bg-top: color-mix(in srgb, var(--shell-bg) 88%, #050608 12%);
        --header-bg-bottom: color-mix(in srgb, var(--shell-bg) 94%, #050608 6%);
        --header-pill-bg: color-mix(in srgb, var(--panel) 70%, #050608 30%);
        --header-pill-border: color-mix(in srgb, var(--text) 14%, transparent);
      }

      html {
        background: var(--shell-bg);
      }

      body {
        overflow: auto;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: var(--header-height);
        background:
          radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 18%, transparent), transparent 26%),
          linear-gradient(180deg, var(--shell-bg) 0%, var(--bg) 100%);
      }

      a {
        color: inherit;
      }

      img {
        display: block;
        max-width: 100%;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .page-header {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 100;
        min-height: var(--header-row-height);
        height: auto;
        background: linear-gradient(180deg, var(--header-bg-top) 0%, var(--header-bg-bottom) 100%);
        backdrop-filter: blur(18px);
      }

      .page-header::after {
        content: "";
        position: absolute;
        inset: 0;
        border-bottom: 1px solid var(--header-border);
        pointer-events: none;
      }

      .page-header__inner {
        width: min(calc(100% - 28px), var(--header-max-width));
        min-height: var(--header-row-height);
        height: auto;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: nowrap;
      }

      .page-header__brand {
        display: inline-flex;
        align-items: center;
        gap: 0.85rem;
        min-width: 0;
        text-decoration: none;
      }

      .page-header__brand img {
        width: 30px;
        height: 30px;
        flex: 0 0 auto;
      }

      .page-header__brand-name {
        font-size: 1.02rem;
        font-weight: 600;
        color: var(--text);
        letter-spacing: 0.01em;
        white-space: nowrap;
      }

      .page-header__nav {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 0.35rem;
        margin-left: 1rem;
        white-space: nowrap;
      }

      .page-header__link {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 0.9rem;
        border-radius: 6px;
        color: var(--text-soft);
        text-decoration: none;
        transition: background-color 160ms ease, color 160ms ease;
      }

      .page-header__link:hover,
      .page-header__link:focus-visible {
        background: var(--surface-hover);
        color: var(--text);
      }

      .page-header__spacer {
        flex: 1 1 auto;
      }

      .page-header__controls {
        display: flex;
        align-items: center;
        gap: 1rem;
        min-width: 0;
        flex: 0 1 auto;
        flex-wrap: nowrap;
      }

      .page-header .settings-select-menu-wrap {
        position: relative;
        flex: 0 0 auto;
        min-width: 0;
        max-width: min(100%, 28rem);
      }

      .page-header .date-native-select-wrap,
      .page-header .settings-select-wrap {
        width: fit-content;
        min-width: 0;
        max-width: 100%;
      }

      .page-header .date-native-select-button,
      .page-header .settings-select-button {
        width: auto;
        min-width: 0;
        max-width: 100%;
        min-height: 38px;
        padding-left: 0.95rem;
        padding-right: 2.2rem;
        border: 1px solid var(--header-pill-border);
        background: var(--header-pill-bg);
        font-size: 0.95rem;
        line-height: 1.2;
      }

      .page-header .date-native-select-button:hover,
      .page-header .date-native-select-button:focus-visible,
      .page-header .settings-select-button:hover,
      .page-header .settings-select-button:focus-visible {
        background: color-mix(in srgb, var(--header-pill-bg) 88%, var(--surface-hover) 12%);
      }

      .page-header .settings-select-button.active,
      .page-header .date-native-select-button.active {
        background: color-mix(in srgb, var(--header-pill-bg) 84%, var(--surface-active) 16%);
      }

      .page-header .date-native-select-caret {
        right: 0.85rem;
      }

      .page-header .date-native-mode-menu {
        min-width: max(100%, 220px);
        max-width: min(420px, calc(100vw - 24px));
        overflow-x: hidden;
      }

      .page-header .date-native-mode-menu[hidden],
      .page-header .settings-select-menu[hidden],
      .page-header .settings-select-menu-empty[hidden],
      .page-header .date-native-mode-option[hidden] {
        display: none !important;
      }

      .page-header .date-native-mode-option {
        min-height: 36px;
        white-space: normal;
        overflow-wrap: anywhere;
      }

      .page-header .settings-select-search-row,
      .page-header .settings-select-menu-options {
        min-width: 0;
        width: 100%;
        overflow-x: hidden;
      }

      .page-header .settings-select-search-input {
        min-width: 0;
        width: 100%;
      }

      .page-header__cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0.65rem 1rem;
        border-radius: 6px;
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: var(--button-equals-text, #07131b);
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
        transition: filter 160ms ease, transform 160ms ease;
      }

      .page-header__cta:hover,
      .page-header__cta:focus-visible {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }

      .page-main {
        position: relative;
        min-height: calc(100vh - var(--header-height));
        min-height: calc(100dvh - var(--header-height));
      }

      .hero-section {
        position: relative;
        overflow: hidden;
        min-height: calc(100vh - var(--header-height));
        padding: clamp(2.5rem, 5vw, 4rem) 0 clamp(3.5rem, 7vw, 5.5rem);
        isolation: isolate;
      }

      .hero-section::before,
      .hero-section::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(72px);
        pointer-events: none;
        opacity: 0.32;
        z-index: 0;
      }

      .hero-section::before {
        width: 22rem;
        height: 22rem;
        top: 7rem;
        left: -6rem;
        background: color-mix(in srgb, var(--accent) 48%, transparent);
      }

      .hero-section::after {
        width: 24rem;
        height: 24rem;
        right: -8rem;
        bottom: 2rem;
        background: color-mix(in srgb, var(--button-equals-bg-end, var(--accent-strong)) 44%, transparent);
      }

      #static-binary-grid {
        position: absolute;
        top: 0;
        left: 50%;
        z-index: 1;
        width: 100vw;
        height: 100%;
        max-height: 100vh;
        overflow: hidden;
        transform: translateX(-50%);
        pointer-events: none;
      }

      .hero-grid-text {
        position: absolute;
        inset: 0;
        margin: 0 -8px;
        overflow: hidden;
        color: color-mix(in srgb, var(--text-soft) 42%, transparent);
        font-family: ui-monospace, SFMono-Regular, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        line-height: 15.75px;
        letter-spacing: 0;
        white-space: pre-wrap;
        word-break: break-all;
        opacity: 0.68;
        user-select: none;
      }

      #static-binary-grid::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 34%;
        background: linear-gradient(180deg, transparent 0%, var(--bg) 100%);
        pointer-events: none;
        z-index: 2;
      }

      .hero-inner {
        position: relative;
        z-index: 3;
        width: min(calc(100% - 28px), 1180px);
        margin: 0 auto;
        display: grid;
        justify-items: center;
        gap: 1.8rem;
        text-align: center;
      }

      .hero-copy {
        display: grid;
        gap: 0.9rem;
        justify-items: center;
        max-width: 50rem;
      }

      .hero-title {
        margin: 0;
        color: var(--text);
        font-size: clamp(2.2rem, 5vw, 4rem);
        line-height: 0.95;
        letter-spacing: -0.03em;
        white-space: nowrap;
        text-wrap: nowrap;
      }

      .hero-subtitle {
        margin: 0;
        color: color-mix(in srgb, var(--text-soft) 88%, white 12%);
        font-size: clamp(1.02rem, 2vw, 1.4rem);
        line-height: 1.45;
        text-wrap: balance;
      }

      .hero-downloads {
        width: fit-content;
        max-width: min(100%, 880px);
        padding: 0.9rem;
        border: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
        border-radius: 18px;
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--panel) 82%, transparent), color-mix(in srgb, var(--window-bg) 92%, transparent));
        box-shadow: 0 22px 44px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(14px);
      }

      .hero-download-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.8rem;
      }

      .hero-store-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        min-height: 56px;
        padding: 0.85rem 1rem;
        border-radius: 14px;
        background: linear-gradient(180deg, color-mix(in srgb, white 94%, var(--panel)) 0%, color-mix(in srgb, white 84%, var(--panel)) 100%);
        color: #111821;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.2;
        white-space: nowrap;
        min-width: 0;
        width: max-content;
        flex: 0 0 auto;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72), 0 12px 24px rgba(0, 0, 0, 0.12);
        transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
      }

      .hero-store-button:hover,
      .hero-store-button:focus-visible {
        transform: translateY(-1px);
        filter: brightness(1.02);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8), 0 16px 28px rgba(0, 0, 0, 0.18);
      }

      .hero-store-button svg {
        flex: 0 0 auto;
        width: 24px;
        height: 24px;
      }

      .hero-store-button span {
        display: inline-block;
        white-space: nowrap;
        text-align: left;
      }

      .hero-store-button--steam svg {
        color: #171a21;
      }

      .hero-store-button--flathub svg {
        color: #4a90e2;
      }

      .coming-soon-modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        padding: 1.25rem;
      }

      .coming-soon-modal[hidden] {
        display: none !important;
      }

      .coming-soon-modal__backdrop {
        position: absolute;
        inset: 0;
        border: 0;
        padding: 0;
        background: color-mix(in srgb, var(--window-bg) 70%, transparent);
        backdrop-filter: blur(18px) saturate(1.08);
      }

      .coming-soon-modal__dialog {
        position: relative;
        width: min(92vw, 440px);
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--text) 14%, transparent);
        border-radius: 28px;
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--panel) 94%, white 6%) 0%, color-mix(in srgb, var(--window-bg) 88%, var(--panel) 12%) 100%);
        box-shadow: 0 34px 88px rgba(0, 0, 0, 0.44);
        color: var(--text);
        transform: translateY(10px) scale(0.98);
        opacity: 0;
        transition: transform 180ms ease, opacity 180ms ease;
      }

      .coming-soon-modal:not([hidden]) .coming-soon-modal__dialog {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      .coming-soon-modal__dialog::before {
        content: "";
        position: absolute;
        top: -5rem;
        right: -2.5rem;
        width: 13rem;
        height: 13rem;
        border-radius: 50%;
        background: color-mix(in srgb, var(--accent) 38%, transparent);
        filter: blur(52px);
        opacity: 0.72;
        pointer-events: none;
      }

      .coming-soon-modal__content {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 1rem;
        padding: 1.4rem;
        text-align: center;
      }

      .coming-soon-modal__title {
        margin: 0;
        font-size: clamp(2.2rem, 5vw, 3rem);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .coming-soon-modal__message {
        margin: 0;
        color: color-mix(in srgb, var(--text-soft) 90%, white 10%);
        font-size: 0.98rem;
        line-height: 1.5;
      }

      .coming-soon-modal__button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        padding: 0.75rem 1.15rem;
        border: 0;
        border-radius: 14px;
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 86%, white 14%) 0%, color-mix(in srgb, var(--accent-strong) 90%, white 10%) 100%);
        color: #fff;
        font: inherit;
        font-weight: 700;
        box-shadow: 0 14px 28px color-mix(in srgb, var(--accent) 28%, transparent);
        transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
      }

      .coming-soon-modal__button:hover,
      .coming-soon-modal__button:focus-visible {
        transform: translateY(-1px);
        filter: brightness(1.03);
        box-shadow: 0 18px 32px color-mix(in srgb, var(--accent) 34%, transparent);
      }

      .coming-soon-modal__button:focus-visible,
      .coming-soon-modal__backdrop:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--accent) 70%, white 30%);
        outline-offset: 3px;
      }

      @media (max-width: 520px) {
        .coming-soon-modal {
          padding: 1rem;
        }

        .coming-soon-modal__content {
          padding: 1.1rem;
        }
      }

      .hero-preview-shell {
        width: min(100%, 980px);
        padding: clamp(12px, 1.6vw, 16px);
        border-radius: 28px;
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--accent) 88%, white 12%) 0%, color-mix(in srgb, var(--button-equals-bg-end, var(--accent-strong)) 84%, white 16%) 100%);
        box-shadow: 0 26px 70px color-mix(in srgb, var(--accent) 34%, transparent);
      }

      .hero-preview-window {
        position: relative;
        overflow: hidden;
        border-radius: 20px;
        border: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
        background: var(--window-bg);
        box-shadow: inset 0 1px 0 color-mix(in srgb, white 10%, transparent);
      }

      .hero-preview-titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.8rem 1rem;
        border-bottom: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
        background: color-mix(in srgb, var(--window-bg-alt) 78%, var(--panel));
      }

      .hero-preview-titlebar-brand {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        min-width: 0;
        color: var(--text);
        font-size: 0.96rem;
        font-weight: 600;
      }

      .hero-preview-titlebar-brand img {
        width: 18px;
        height: 18px;
      }

      .hero-preview-window-controls {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .hero-preview-window-control {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--text-soft) 36%, var(--panel-strong));
      }

      .hero-preview-window-control:last-child {
        background: color-mix(in srgb, var(--danger, #ff6d7a) 78%, white 22%);
      }

      .hero-preview-embed {
        width: 100%;
        aspect-ratio: 16 / 10.4;
        background: var(--shell-bg);
      }

      .hero-preview-embed iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--shell-bg);
      }

      .page-header.page-header--stacked .page-header__inner {
        padding: 0.9rem 0;
        flex-wrap: wrap;
        row-gap: 0.75rem;
      }

      .page-header.page-header--stacked .page-header__brand,
      .page-header.page-header--stacked .page-header__nav {
        flex: 1 0 100%;
        width: 100%;
        margin-left: 0;
      }

      .page-header.page-header--stacked .page-header__spacer {
        display: none;
      }

      .page-header.page-header--stacked .page-header__controls {
        width: 100%;
        flex: 1 0 100%;
        flex-wrap: nowrap;
        justify-content: flex-start;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .page-header.page-header--stacked .page-header__controls::-webkit-scrollbar {
        display: none;
      }

      @media (max-width: 720px) {
        .page-header.page-header--stacked .page-header__controls {
          gap: 0.75rem;
        }

        .page-main {
          min-height: 0;
        }

        .hero-section {
          min-height: 0;
          padding-top: 2.4rem;
        }

        .hero-title {
          white-space: normal;
          text-wrap: balance;
          font-size: clamp(2rem, 8vw, 3.4rem);
        }

        .hero-download-actions {
          flex-direction: column;
          align-items: stretch;
        }

        .hero-store-button {
          width: 100%;
        }

        .hero-store-button span {
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <div class="page-header__inner">
        <a class="page-header__brand" href="index.html" aria-label="Roselt Calculator home">
          <img src="assets/logos/dark.svg" alt="Roselt Calculator logo" width="30" height="30" />
          <span class="page-header__brand-name">Roselt Calculator</span>
        </a>

        <nav class="page-header__nav" aria-label="Primary navigation" data-primary-nav>
          <a class="page-header__link" data-themes-link href="themes.html" hidden>Themes</a>
          <a class="page-header__link" data-updates-link href="Updates.html">Updates</a>
        </nav>

        <span class="page-header__spacer" aria-hidden="true"></span>

        <div class="page-header__controls">
          <div class="date-native-select-wrap settings-select-wrap settings-select-menu-wrap" data-menu-wrap="language">
            <button type="button" class="date-native-select-button settings-select-button" data-menu-toggle="language" aria-haspopup="listbox" aria-expanded="false" aria-controls="language-menu" aria-label="Language">
              <span class="settings-select-button-label">Loading languages...</span>
            </button>
            <span class="date-native-select-caret ui-caret" aria-hidden="true"></span>
            <div class="date-native-mode-menu settings-select-menu" id="language-menu" data-menu-panel="language" role="listbox" aria-label="Language" hidden></div>
          </div>

          <div class="date-native-select-wrap settings-select-wrap settings-select-menu-wrap" data-menu-wrap="theme">
            <button type="button" class="date-native-select-button settings-select-button" data-menu-toggle="theme" aria-haspopup="listbox" aria-expanded="false" aria-controls="theme-menu" aria-label="Theme">
              <span class="settings-select-button-label">Loading themes...</span>
            </button>
            <span class="date-native-select-caret ui-caret" aria-hidden="true"></span>
            <div class="date-native-mode-menu settings-select-menu" id="theme-menu" data-menu-panel="theme" role="listbox" aria-label="Theme" hidden></div>
          </div>

          <a class="page-header__cta" data-launch-link href="app.html?page=standard&theme=dark&language=en" target="_blank" rel="noopener noreferrer">Launch Calculator</a>
        </div>
      </div>
    </header>

    <main class="page-main" id="main-content">
      <section class="hero-section" aria-labelledby="hero-title">
        <div id="static-binary-grid" aria-hidden="true">
          <div class="hero-grid-text" data-hero-grid-text></div>
        </div>

        <div class="hero-inner">
          <div class="hero-copy">
            <h1 class="hero-title" id="hero-title" data-hero-title>The Best Calculator App</h1>
            <p class="hero-subtitle" data-hero-subtitle>
              Your home for standard, scientific, and advanced calculator work.
            </p>
          </div>

          <div class="hero-downloads" aria-label="Platform downloads" data-downloads-section>
            <div class="hero-download-actions">
              <a class="hero-store-button hero-store-button--steam" href="https://store.steampowered.com/app/4597760/Roselt_Calculator/" target="_blank" rel="noopener noreferrer" aria-label="Download on Steam" data-store-link="steam">
                <svg viewBox="0 0 24 24" aria-hidden="true">

      function isLocalPublicContext() {

          || hostname === 'localhost'

          || hostname === '0.0.0.0'
          || hostname === '::1'
          || hostname === '[::1]'
          || hostname.endsWith('.localhost');

      function syncHeaderOffset() {
        if (!(pageHeader instanceof HTMLElement)) {

        const measuredHeight = Math.max(74, Math.ceil(pageHeader.getBoundingClientRect().height));
        document.documentElement.style.setProperty('--header-height', `${measuredHeight}px`);
      }

      function updateHeaderLayout() {
        if (!(pageHeader instanceof HTMLElement) || !(headerInner instanceof HTMLElement)) {
          syncHeaderOffset();

        pageHeader.classList.remove('page-header--stacked');
        const needsStackedLayout = headerInner.scrollWidth > headerInner.clientWidth + 1;
        pageHeader.classList.toggle('page-header--stacked', needsStackedLayout);
        syncHeaderOffset();
      }

      function scheduleHeaderLayoutUpdate() {
        if (typeof window.requestAnimationFrame !== 'function') {
          updateHeaderLayout();
          return;
        }

        if (headerLayoutFrame !== null) {
          window.cancelAnimationFrame(headerLayoutFrame);
        }

        headerLayoutFrame = window.requestAnimationFrame(() => {
          headerLayoutFrame = null;
          updateHeaderLayout();
        });
      }

      function normalizeLocaleCandidate(locale) {
        return typeof locale === 'string' ? locale.trim().replaceAll('_', '-') : '';
      }

      function getLocaleParts(locale) {
        const normalizedLocale = normalizeLocaleCandidate(locale);
        if (!normalizedLocale) {
          return { language: '', region: '', script: '' };
        }

        if (typeof Intl?.Locale === 'function') {
          try {
            const intlLocale = new Intl.Locale(normalizedLocale).maximize();
            return {
              language: intlLocale.language?.toLowerCase() ?? '',
              region: intlLocale.region?.toUpperCase() ?? '',
              script: intlLocale.script?.toLowerCase() ?? ''
            };
          } catch {
            // Fall through to basic parsing.
          }
        }

        const [language = '', second = '', third = ''] = normalizedLocale.split('-');
        const inferredRegion = second.length === 2 ? second : third.length === 2 ? third : '';
        const inferredScript = second.length === 4 ? second : '';
        return {
          language: language.toLowerCase(),
          region: inferredRegion.toUpperCase(),
          script: inferredScript.toLowerCase()
        };
      }

      function getPreferredBrowserLocales() {
        const localeCandidates = [];

        if (Array.isArray(window.navigator?.languages)) {
          localeCandidates.push(...window.navigator.languages);
        }

        if (typeof window.navigator?.language === 'string') {
          localeCandidates.push(window.navigator.language);
        }

        if (typeof Intl?.DateTimeFormat === 'function') {
          const resolvedLocale = new Intl.DateTimeFormat().resolvedOptions().locale;
          if (resolvedLocale) {
            localeCandidates.push(resolvedLocale);
          }
        }

        return [...new Set(localeCandidates.map(normalizeLocaleCandidate).filter(Boolean))];
      }

      function findSupportedLanguageByValue(languageId) {
        if (typeof languageId !== 'string' || !languageId.trim()) {
          return null;
        }

        const normalizedLanguageId = languageId.trim().toLowerCase();
        return rawLanguageOptions.find((option) => option.value.toLowerCase() === normalizedLanguageId)?.value ?? null;
      }

      function resolveBrowserLanguageId() {
        for (const locale of getPreferredBrowserLocales()) {
          const exactMatch = findSupportedLanguageByValue(locale);
          if (exactMatch) {
            return exactMatch;
          }

          const { language, region, script } = getLocaleParts(locale);
          if (!language) {
            continue;
          }

          if (language === 'zh') {
            return script === 'hant' || ['HK', 'MO', 'TW'].includes(region) ? 'zh-Hant' : 'zh-Hans';
          }

          if (language === 'es') {
            return LATIN_AMERICAN_SPANISH_REGIONS.has(region) ? 'es-419' : 'es-ES';
          }

          if (language === 'pt') {
            return region === 'BR' ? 'pt-BR' : 'pt-PT';
          }

          const baseMatch = findSupportedLanguageByValue(language);
          if (baseMatch) {
            return baseMatch;
          }

          const prefixedMatch = rawLanguageOptions.find((option) => option.value.toLowerCase().startsWith(`${language}-`));
          if (prefixedMatch) {
            return prefixedMatch.value;
          }
        }

        return getDefaultLanguage();
      }

      function getSystemThemeId() {
        return systemThemeMedia?.matches === true ? 'light' : 'dark';
      }

      function isSupportedThemeSetting(themeId) {
        return themeId === 'system' || baseThemeOptions.some((theme) => theme.value === themeId);
      }

      function normalizeThemeSetting(themeId) {
        return isSupportedThemeSetting(themeId) ? themeId : 'system';
      }

      function getStoredPreference(primaryKey, secondaryKey) {
        const primaryValue = window.localStorage.getItem(primaryKey);
        if (typeof primaryValue === 'string' && primaryValue.trim()) {
          return primaryValue.trim();
        }

        const secondaryValue = window.localStorage.getItem(secondaryKey);
        return typeof secondaryValue === 'string' && secondaryValue.trim() ? secondaryValue.trim() : null;
      }

      function isKlingonLanguage(languageCode) {
        return languageCode === 'tlh-Latn' || languageCode === 'tlh-Piqd';
      }

      function isUnhelpfulLocalizedLanguageName(languageCode, localizedName) {
        return localizedName.localeCompare(languageCode, undefined, { sensitivity: 'base' }) === 0;
      }

      function getLanguageOptionLabel(language) {
        return `${language.label}${language.isFallbackOnly ? ' (English fallback)' : ''}`;
      }

      function getLanguageDisplayNames(locale) {
        if (typeof Intl?.DisplayNames !== 'function') {
          return null;
        }

        if (LANGUAGE_DISPLAY_NAMES_CACHE.has(locale)) {
          return LANGUAGE_DISPLAY_NAMES_CACHE.get(locale);
        }

        try {
          const displayNames = new Intl.DisplayNames([locale], { type: 'language' });
          LANGUAGE_DISPLAY_NAMES_CACHE.set(locale, displayNames);
          return displayNames;
        } catch {
          LANGUAGE_DISPLAY_NAMES_CACHE.set(locale, null);
          return null;
        }
      }

      function getLocalizedLanguageName(languageCode, locale) {
        const displayNames = getLanguageDisplayNames(locale);
        if (!displayNames) {
          return '';
        }

        try {
          return displayNames.of(languageCode) ?? '';
        } catch {
          return '';
        }
      }

      function getVisibleLanguageLabel(language, locale) {
        const localizedName = isKlingonLanguage(language.value)
          ? ''
          : getLocalizedLanguageName(language.value, locale).trim();
        const baseLabel = !localizedName || isUnhelpfulLocalizedLanguageName(language.value, localizedName)
          ? language.label
          : localizedName;
        return `${baseLabel}${language.isFallbackOnly ? ' (English fallback)' : ''}`;
      }

      function getLanguageEnglishName(languageCode) {
        if (!ENGLISH_LANGUAGE_DISPLAY_NAMES) {
          return '';
        }

        try {
          return ENGLISH_LANGUAGE_DISPLAY_NAMES.of(languageCode) ?? '';
        } catch {
          return '';
        }
      }

      function getLanguageEnglishAlias(languageCode, nativeLabel) {
        const englishName = getLanguageEnglishName(languageCode).trim();
        if (!englishName) {
          return '';
        }

        return englishName.localeCompare(nativeLabel, undefined, { sensitivity: 'base' }) === 0
          ? ''
          : englishName;
      }

      function getLanguageSearchText(language, locale) {
        const englishAlias = getLanguageEnglishAlias(language.value, language.label);
        return [
          language.value,
          language.label,
          getLanguageOptionLabel(language),
          getVisibleLanguageLabel(language, locale),
          englishAlias
        ]
          .filter(Boolean)
          .join(' ');
      }

      function buildLocalizedLanguageOptions(locale) {
        return rawLanguageOptions.map((language) => ({
          ...language,
          label: getVisibleLanguageLabel(language, locale),
          searchText: getLanguageSearchText(language, locale)
        }));
      }

      function getRequestedLanguageId() {
        const params = new URLSearchParams(window.location.search);
        const queryLanguage = params.get('language');
        const requestedQueryLanguage = findSupportedLanguageByValue(queryLanguage);
        if (requestedQueryLanguage) {
          return requestedQueryLanguage;
        }

        const storedLanguage = findSupportedLanguageByValue(getStoredPreference(LANGUAGE_STORAGE_KEY, APP_LANGUAGE_STORAGE_KEY));
        return storedLanguage ?? resolveBrowserLanguageId();
      }

      function getRequestedThemeId() {
        const params = new URLSearchParams(window.location.search);
        const queryTheme = params.get('theme');
        if (typeof queryTheme === 'string' && queryTheme.trim()) {
          return normalizeThemeSetting(queryTheme.trim());
        }

        return normalizeThemeSetting(getStoredPreference(THEME_STORAGE_KEY, APP_THEME_STORAGE_KEY) ?? 'system');
      }

      function normalizePage(page) {
        return typeof page === 'string' && isMode(page.trim().toLowerCase()) ? page.trim().toLowerCase() : DEFAULT_MODE;
      }

      function getRequestedAppPage() {
        const params = new URLSearchParams(window.location.search);
        const queryPage = params.get('page');
        if (queryPage) {
          return normalizePage(queryPage);
        }

        return normalizePage(window.localStorage.getItem(APP_PAGE_STORAGE_KEY) ?? DEFAULT_MODE);
      }

      function syncUrl({ themeId, languageId }) {
        const url = new URL(window.location.href);
        url.searchParams.set('page', currentAppPage);
        url.searchParams.set('theme', themeId);
        url.searchParams.set('language', languageId);
        window.history.replaceState({}, '', url);
      }

      function getMenuElements(menuId) {
        if (menuId === 'language') {
          return { toggle: languageToggle, menu: languageMenu };

        return { toggle: themeToggle, menu: themeMenu };

      function openComingSoonPopup(message) {

            comingSoonPrimaryClose.focus();
          }

      function closeComingSoonPopup() {
        if (!(comingSoonModal instanceof HTMLElement) || comingSoonModal.hidden) {
          return;

        comingSoonModal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';

        if (comingSoonLastFocus) {
          comingSoonLastFocus.focus();
          comingSoonLastFocus = null;

      function getSiteCopy() {
        return {
          themes: translateSiteCopy('themesPage.summary.themeCountLabel', FALLBACK_SITE_COPY.themes),
          updates: translateSiteCopy('landingPage.header.updates', FALLBACK_SITE_COPY.updates),

      function buildThemeOptions() {
        const copy = getSiteCopy();
        const systemThemeId = getResolvedAppThemeId('system', getSystemThemeId());
        const systemThemeLabel = baseThemeOptions.find((theme) => theme.value === systemThemeId)?.label ?? systemThemeId;
        return [
          {
            value: 'system',
            label: copy.systemTheme,
            searchText: `${copy.systemTheme} system auto ${systemThemeLabel}`

      function updateToggleLabel(menuId, label) {
        const { toggle } = getMenuElements(menuId);
        const labelElement = toggle.querySelector('.settings-select-button-label');
        labelElement.textContent = label;

      function renderMenuOptions(menuId, options, selectedValue) {
        const { menu } = getMenuElements(menuId);
        const copy = getSiteCopy();
        const menuLabel = menuId === 'language' ? copy.language : copy.theme;
        const searchPlaceholder = menuId === 'language' ? copy.languageSearch : copy.themeSearch;
        menu.replaceChildren();

        menu.setAttribute('aria-label', menuLabel);

        const searchRow = document.createElement('div');
        searchRow.className = 'settings-select-search-row';

        const searchInput = document.createElement('input');
        searchInput.type = 'search';
        searchInput.className = 'settings-select-search-input';
        searchInput.dataset.menuSearch = menuId;
        searchInput.placeholder = searchPlaceholder;
        searchInput.setAttribute('aria-label', searchPlaceholder);
        searchInput.autocomplete = 'off';
        searchInput.spellcheck = false;
        searchRow.append(searchInput);

        const optionsContainer = document.createElement('div');
        optionsContainer.className = 'settings-select-menu-options';
        optionsContainer.dataset.menuOptions = menuId;
        optionsContainer.role = 'listbox';
        optionsContainer.setAttribute('aria-label', menuLabel);

        for (const option of options) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = `date-native-mode-option${option.value === selectedValue ? ' selected' : ''}`;
          button.dataset.menuOption = menuId;
          button.dataset.value = option.value;
          button.dataset.menuText = `${option.searchText ?? option.label} ${option.value}`.toLowerCase();
          button.role = 'option';
          button.ariaSelected = option.value === selectedValue ? 'true' : 'false';

          const label = document.createElement('span');
          label.className = 'settings-menu-option-label';
          label.textContent = option.label;
          button.append(label);
          optionsContainer.append(button);
        }

        const emptyState = document.createElement('div');
        emptyState.className = 'settings-select-menu-empty';
        emptyState.dataset.menuEmpty = menuId;
        emptyState.hidden = true;
        emptyState.textContent = copy.noMatches;

        menu.append(searchRow, optionsContainer, emptyState);
      }

      function filterMenuOptions(menuId, searchText) {
        const { menu } = getMenuElements(menuId);
        const normalizedSearch = searchText.trim().toLowerCase();
        const optionButtons = menu.querySelectorAll('[data-menu-option]');
        let visibleCount = 0;

        for (const button of optionButtons) {
          const isMatch = !normalizedSearch || button.dataset.menuText.includes(normalizedSearch);
          button.hidden = !isMatch;
          if (isMatch) {
            visibleCount += 1;
          }
        }

        const emptyState = menu.querySelector('[data-menu-empty]');
        if (emptyState) {
          emptyState.hidden = visibleCount > 0;
        }
      }

      function closeMenus() {
        openMenuId = null;

        for (const menuId of ['language', 'theme']) {
          const { toggle, menu } = getMenuElements(menuId);
          toggle.classList.remove('active');
          toggle.setAttribute('aria-expanded', 'false');
          menu.hidden = true;
        }
      }

      function toggleMenu(menuId) {
        if (openMenuId === menuId) {
          closeMenus();
          return;
        }

        closeMenus();
        const { toggle, menu } = getMenuElements(menuId);
        renderMenuOptions(menuId, menuId === 'language' ? languageOptions : themeOptions, menuId === 'language' ? currentLanguageId : currentThemeSetting);
        toggle.classList.add('active');
        toggle.setAttribute('aria-expanded', 'true');
        menu.hidden = false;
        openMenuId = menuId;

        const searchInput = menu.querySelector('[data-menu-search]');
        if (searchInput instanceof HTMLInputElement) {
          searchInput.value = '';
          filterMenuOptions(menuId, '');
          requestAnimationFrame(() => searchInput.focus());
        }
      }

      function updateLaunchLink() {
        launchLink.href = buildAppUrl({
          page: currentAppPage,
          theme: currentThemeSetting,
          language: currentLanguageId
        });
      }

      function updateCalculatorPreview() {
        const previewUrl = buildAppUrl({
          page: currentAppPage,
          theme: currentThemeSetting,
          language: currentLanguageId
        });
        if (calculatorPreviewFrame.src !== previewUrl) {
          calculatorPreviewFrame.src = previewUrl;
        }
      }

      function buildHeroBinaryGrid() {
        const tokens = ['0', '1', 'ROSELT', 'CALCULATOR', 'STANDARD', 'GRAPHING', 'STEAM', 'FLATHUB', 'PLAY'];
        const rows = [];
        for (let row = 0; row < 170; row += 1) {
          const parts = [];
          for (let column = 0; column < 108; column += 1) {
            const randomValue = Math.random();
            if (randomValue > 0.987) {
              parts.push(tokens[Math.floor(Math.random() * tokens.length)]);
            } else {
              parts.push(Math.random() > 0.5 ? '1' : '0');
            }
          }
          rows.push(parts.join(' '));
        }
        heroGridText.textContent = rows.join('\n');
      }

      function applyTheme(themeSetting) {
        const normalizedThemeSetting = normalizeThemeSetting(themeSetting);
        const resolvedThemeId = getResolvedAppThemeId(normalizedThemeSetting, getSystemThemeId());
        const activeTheme = applyThemeToElement(document.documentElement, resolvedThemeId);
        if (!activeTheme) {
          return;
        }

        currentThemeSetting = normalizedThemeSetting;
        window.localStorage.setItem(THEME_STORAGE_KEY, normalizedThemeSetting);
        window.localStorage.setItem(APP_THEME_STORAGE_KEY, normalizedThemeSetting);
        syncUrl({
          themeId: normalizedThemeSetting,
          languageId: currentLanguageId
        });
        updateLaunchLink();
        updateToggleLabel('theme', themeOptions.find((theme) => theme.value === currentThemeSetting)?.label ?? activeTheme.label ?? currentThemeSetting);
        renderMenuOptions('theme', themeOptions, currentThemeSetting);

        if (themeColorMeta) {
          themeColorMeta.content = activeTheme.metaColor ?? '#1f2025';
        }

        const themeLogoPath = getThemeLogoPath(activeTheme.id);
        brandImage.src = themeLogoPath;
        previewLogo.src = themeLogoPath;
        updateCalculatorPreview();

        if (favicon instanceof HTMLLinkElement) {
          favicon.href = themeLogoPath;
        }
        scheduleHeaderLayoutUpdate();
      }

      function updateLocalizedCopy() {
        const copy = getSiteCopy();
        primaryNav.setAttribute('aria-label', copy.primaryNavigation);
        brandLink.setAttribute('aria-label', copy.home);
        if (themesLink instanceof HTMLAnchorElement) {
          themesLink.hidden = !isLocalPublicContext();
          themesLink.textContent = copy.themes;
          themesLink.href = 'themes.html';
        }
        updatesLink.textContent = copy.updates;
        launchLink.textContent = copy.launchCalculator;
        launchLink.setAttribute('aria-label', copy.launchCalculatorNewTab);
        launchLink.title = copy.launchCalculatorNewTab;
        languageToggle.setAttribute('aria-label', copy.language);
        languageMenu.setAttribute('aria-label', copy.language);
        themeToggle.setAttribute('aria-label', copy.theme);
        themeMenu.setAttribute('aria-label', copy.theme);
        heroTitle.textContent = copy.heroTitle;
        heroSubtitle.textContent = copy.heroSubtitle;
        downloadsSection.setAttribute('aria-label', copy.platformDownloads);
        calculatorPreviewFrame.title = copy.livePreview;
        comingSoonBackdrop.setAttribute('aria-label', copy.closeComingSoon);
        comingSoonTitle.textContent = copy.comingSoon;
        comingSoonPrimaryClose.textContent = copy.dismissComingSoon;

        const storeLinks = [
          [steamStoreLink, copy.downloadSteam],
          [flathubStoreLink, copy.downloadFlathub],
          [googleStoreLink, copy.downloadGooglePlay]
        ];

        for (const [link, label] of storeLinks) {
          link.setAttribute('aria-label', label);
          const labelElement = link.querySelector('[data-store-label]');
          if (labelElement) {
            labelElement.textContent = label;
          }
        }
        scheduleHeaderLayoutUpdate();
      }

      async function applyLanguage(languageId) {
        const nextLanguageId = findSupportedLanguageByValue(languageId) ?? getDefaultLanguage();

        await initI18n(nextLanguageId);
        currentLanguageId = nextLanguageId;
        languageOptions = buildLocalizedLanguageOptions(getCurrentLocale());
        window.localStorage.setItem(LANGUAGE_STORAGE_KEY, nextLanguageId);
        window.localStorage.setItem(APP_LANGUAGE_STORAGE_KEY, nextLanguageId);
        syncUrl({
          themeId: currentThemeSetting,
          languageId: nextLanguageId
        });
        themeOptions = buildThemeOptions();
        updateLocalizedCopy();
        updateLaunchLink();
        updateCalculatorPreview();
        updateToggleLabel('language', languageOptions.find((language) => language.value === currentLanguageId)?.label ?? 'English');
        renderMenuOptions('language', languageOptions, currentLanguageId);
        updateToggleLabel('theme', themeOptions.find((theme) => theme.value === currentThemeSetting)?.label ?? currentThemeSetting);
        renderMenuOptions('theme', themeOptions, currentThemeSetting);
        scheduleHeaderLayoutUpdate();
      }

      async function initializeHeader() {
        await initThemes();

        rawLanguageOptions = getSupportedLanguages();
        baseThemeOptions = getThemeOptions();
        currentAppPage = getRequestedAppPage();

        await applyLanguage(getRequestedLanguageId());
        applyTheme(getRequestedThemeId());

        if (systemThemeMedia?.addEventListener) {
          systemThemeMedia.addEventListener('change', () => {
            if (currentThemeSetting === 'system') {
              themeOptions = buildThemeOptions();
              applyTheme('system');
            }
          });
        } else if (systemThemeMedia?.addListener) {
          systemThemeMedia.addListener(() => {
            if (currentThemeSetting === 'system') {
              themeOptions = buildThemeOptions();
              applyTheme('system');
            }
          });
        }

        const refreshStoredPage = () => {
          const storedPage = normalizePage(window.localStorage.getItem(APP_PAGE_STORAGE_KEY) ?? currentAppPage);
          if (storedPage !== currentAppPage) {
            currentAppPage = storedPage;
            syncUrl({
              themeId: currentThemeSetting,
              languageId: currentLanguageId
            });
            updateLaunchLink();
            updateCalculatorPreview();
          }
        };

        window.addEventListener('focus', refreshStoredPage);
        window.addEventListener('resize', scheduleHeaderLayoutUpdate);
        window.addEventListener('storage', (event) => {
          if (event.key === APP_PAGE_STORAGE_KEY) {
            refreshStoredPage();
          }
        });
        scheduleHeaderLayoutUpdate();
        if (document.fonts?.ready) {
          void document.fonts.ready.then(scheduleHeaderLayoutUpdate);
        }
      }

      document.addEventListener('click', async (event) => {
        const comingSoonClose = event.target.closest('[data-coming-soon-close]');
        if (comingSoonClose) {
          closeComingSoonPopup();
          return;
        }

        const comingSoonLink = event.target.closest('[data-coming-soon]');
        if (comingSoonLink) {
          event.preventDefault();
          openComingSoonPopup(comingSoonLink.dataset.comingSoon || getSiteCopy().comingSoon);
          return;
        }

        const toggle = event.target.closest('[data-menu-toggle]');
        if (toggle) {
          toggleMenu(toggle.dataset.menuToggle);
          return;
        }

        const option = event.target.closest('[data-menu-option]');
        if (option) {
          if (option.dataset.menuOption === 'language') {
            await applyLanguage(option.dataset.value);
          } else {
            applyTheme(option.dataset.value);
          }
          closeMenus();
          return;
        }

        if (!event.target.closest('.settings-select-menu-wrap')) {
          closeMenus();
        }
      });

      document.addEventListener('input', (event) => {
        if (event.target.matches('[data-menu-search]')) {
          filterMenuOptions(event.target.dataset.menuSearch, event.target.value);
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          if (comingSoonModal && !comingSoonModal.hidden) {
            closeComingSoonPopup();
            return;
          }

          closeMenus();
        }
      });

      buildHeroBinaryGrid();

      void initializeHeader().catch((error) => {
        console.error('Unable to initialize the header controls.', error);
        rawLanguageOptions = [{ value: 'en', label: 'English', isFallbackOnly: false }];
        languageOptions = rawLanguageOptions;
        baseThemeOptions = [{ value: 'dark', label: 'Dark' }];
        themeOptions = buildThemeOptions();
        void applyLanguage('en');
        applyTheme('system');
      });
    </script>
  </body>
</html>
