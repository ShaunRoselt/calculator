<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2025" />
    <title>Roselt Calculator | Themes</title>
    <link rel="icon" id="page-favicon" type="image/svg+xml" href="assets/logos/dark.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/Views/DateCalculator.css" />
    <link rel="stylesheet" href="styles/Views/Settings.css" />
    <link rel="stylesheet" href="styles/publicPage.css" />
    <link rel="stylesheet" href="styles/themesPage.css" />
    <link rel="stylesheet" id="active-theme-stylesheet" href="assets/themes/css/dark.css" />
  </head>
  <body>
    <header class="page-header">
      <div class="page-header__inner">
        <a class="page-header__brand" href="index.html" aria-label="Roselt Calculator home">
          <img src="assets/logos/dark.svg" alt="Roselt Calculator logo" width="30" height="30" />
          <span class="page-header__brand-name">Roselt Calculator</span>
        </a>

        <nav class="page-header__nav" aria-label="Primary navigation" data-primary-nav>
          <a class="page-header__link" data-themes-link href="themes.html" hidden>Themes</a>
          <a class="page-header__link" data-updates-link href="Updates.html">Updates</a>
        </nav>

        <span class="page-header__spacer" aria-hidden="true"></span>

        <div class="page-header__controls">
          <div class="date-native-select-wrap settings-select-wrap settings-select-menu-wrap" data-menu-wrap="language">
            <button type="button" class="date-native-select-button settings-select-button" data-menu-toggle="language" aria-haspopup="listbox" aria-expanded="false" aria-controls="language-menu" aria-label="Language">
              <span class="settings-select-button-label">Loading languages...</span>
            </button>
            <span class="date-native-select-caret ui-caret" aria-hidden="true"></span>
            <div class="date-native-mode-menu settings-select-menu" id="language-menu" data-menu-panel="language" role="listbox" aria-label="Language" hidden></div>
          </div>

          <div class="date-native-select-wrap settings-select-wrap settings-select-menu-wrap" data-menu-wrap="theme">
            <button type="button" class="date-native-select-button settings-select-button" data-menu-toggle="theme" aria-haspopup="listbox" aria-expanded="false" aria-controls="theme-menu" aria-label="Theme">
              <span class="settings-select-button-label">Loading themes...</span>
            </button>
            <span class="date-native-select-caret ui-caret" aria-hidden="true"></span>
            <div class="date-native-mode-menu settings-select-menu" id="theme-menu" data-menu-panel="theme" role="listbox" aria-label="Theme" hidden></div>
          </div>

          <a class="page-header__cta" data-launch-link href="app.html?page=standard&theme=dark&language=en" target="_blank" rel="noopener noreferrer">Launch Calculator</a>
        </div>
      </div>
    </header>

    <main class="page-main page-main--showcase" id="main-content">
      <section class="hero-section hero-section--showcase" aria-labelledby="hero-title">
        <div id="static-binary-grid" aria-hidden="true">
          <div class="hero-grid-text" data-hero-grid-text></div>
        </div>

        <div class="hero-inner hero-inner--showcase">
          <div class="hero-copy hero-copy--showcase">
            <p class="hero-eyebrow" data-showcase-eyebrow>Appearance</p>
            <h1 class="hero-title" id="hero-title" data-hero-title>Themes</h1>
            <p class="hero-subtitle" data-hero-subtitle>
              Pick the look of the app.
            </p>
          </div>

          <aside class="showcase-summary-panel" data-showcase-summary aria-label="Theme summary">
            <div class="showcase-summary-grid">
              <article class="showcase-stat">
                <span class="showcase-stat__value" data-theme-count>0</span>
                <span class="showcase-stat__label" data-theme-count-label>Themes</span>
              </article>
            </div>
          </aside>
        </div>
      </section>

      <section class="showcase-section" aria-labelledby="themes-title">
        <div class="showcase-section__copy">
          <p class="showcase-section__eyebrow" data-themes-kicker>Appearance</p>
          <h2 class="showcase-section__title" id="themes-title" data-themes-title>Theme</h2>
          <p class="showcase-section__description" data-themes-copy>Pick the look of the app.</p>
        </div>
        <div class="themes-search">
          <input type="search" class="themes-search__input" data-theme-search placeholder="Search themes" aria-label="Search themes" autocomplete="off" spellcheck="false" />
        </div>
        <div class="theme-gallery" data-theme-gallery>
          <p class="showcase-status" data-theme-gallery-status>Loading themes...</p>
        </div>
      </section>
    </main>

    <script type="module" src="scripts/themesPage.js"></script>
  </body>
</html>
